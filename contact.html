<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="contact.css">
    <title>Contato | Meu Portifólio</title>
</head>
<body>

    <section class="contact-container">
        <h2>Entre em contato</h2>
        <p>Gostou do meu trabalho? Vamos conversar! <span class="smile-emoji">😊</span></p>

        <form action="#" method="post" class="contact-form">
            <div class="input-group">
                <label for="name">Nome</label>
                <input type="text" id="name" name="name" placeholder="Seu nome completo" required>
            </div>

            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="seuemail@email.com" required>
            </div>

            <div class="input-group">
                <label for="message">Mensagem</label>
                <textarea name="message" id="message" rows="5" placeholder="Como posso te ajudar?" required></textarea>
            </div>

            <button type="submit">Enviar Mensagem</button>
        </form>

    </section>
    
</body>
</html>
